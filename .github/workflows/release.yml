name: Release
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
permissions:
  contents: read
env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: deptryrs
jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_suffix: tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive_suffix: tar.gz
            use_cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive_suffix: tar.gz
            use_cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            archive_suffix: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_suffix: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_suffix: zip
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@e03236526ace47fa2e04bebcfc6da471ebd4690c # v2.49.0
        with:
          tool: cross
      - name: Cache Cargo registry and build artifacts
        uses: Swatinem/rust-cache@400e7407cfd7a091e5fbb6afec01ec146c432b7c # v2.7.7
        with:
          key: ${{ matrix.target }}
      - name: Build (native)
        if: "!matrix.use_cross"
        run: cargo build --release --target ${{ matrix.target }}
      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}
      - name: Package binary (Unix)
        if: matrix.os != 'windows-latest'
        env:
          REF_NAME: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
        run: |
          cp "target/${TARGET}/release/${BINARY_NAME}" .
          tar czf "${BINARY_NAME}-${REF_NAME}-${TARGET}.tar.gz" "${BINARY_NAME}"
      - name: Package binary (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        env:
          REF_NAME: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
        run: |
          Copy-Item "target/${env:TARGET}/release/${env:BINARY_NAME}.exe" .
          Compress-Archive -Path "${env:BINARY_NAME}.exe" -DestinationPath "${env:BINARY_NAME}-${env:REF_NAME}-${env:TARGET}.zip"
      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.target }}
          path: ${{ env.BINARY_NAME }}-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive_suffix }}
          if-no-files-found: error
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Download all build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: ${{ env.BINARY_NAME }}-*
          merge-multiple: true
          path: artifacts/
      - name: Generate SHA-256 checksums
        working-directory: artifacts
        run: sha256sum * > SHA256SUMS.txt
      - name: Create GitHub Release
        uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8 # v2.3.2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
  publish-crates-io:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [build, github-release]
    environment: crates-io
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Publish to crates.io
        run: cargo publish --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
