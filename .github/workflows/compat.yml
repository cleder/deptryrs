name: Compatibility
on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:
permissions:
  contents: read
env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
jobs:
  toolchain-compat:
    name: Rust ${{ matrix.toolchain }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain:
          - beta
          - nightly
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install ${{ matrix.toolchain }} Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # master
        with:
          toolchain: ${{ matrix.toolchain }}
      - name: Cache Cargo registry and build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.toolchain }}
      - name: cargo check (${{ matrix.toolchain }})
        run: cargo check --workspace --all-targets
        continue-on-error: ${{ matrix.toolchain == 'nightly' }}
      - name: cargo test (${{ matrix.toolchain }})
        run: cargo test --workspace --all-targets
        continue-on-error: ${{ matrix.toolchain == 'nightly' }}
  msrv:
    name: Minimum Supported Rust Version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install cargo-msrv
        uses: taiki-e/install-action@9bcaee1dcae34154180f412e2fa69355a7cda9f6 # v2.82.6
        with:
          tool: cargo-msrv
      - name: Verify MSRV
        # edition 2024 requires Rust 1.85.0 minimum
        run: cargo msrv --min 1.85.0 verify
